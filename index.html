<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Titanium.dev｜前端開發作品集</title>
    <meta name="description" content="前端開發作品集，使用 Vue 3、TypeScript 打造，收錄電商、AI 對話、知識型網站等實作專案與技術文章。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Titanium.dev｜前端開發作品集" />
    <meta property="og:description" content="前端開發作品集，使用 Vue 3、TypeScript 打造，收錄電商、AI 對話、知識型網站等實作專案與技術文章。" />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <style>
      #initialLoader {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #3d5a5a;
        color: #ffffff;
        font-family:
          'Noto Sans TC',
          'PingFang TC',
          'Microsoft JhengHei',
          sans-serif;
        font-size: 14px;
        font-weight: 600;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.25);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
      }
      #initialLoader.isHidden {
        opacity: 0;
        transform: translateY(12px) scale(0.9);
        pointer-events: none;
      }
      #initialLoader .spinner {
        width: 16px;
        height: 16px;
        flex: none;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: initialLoaderSpin 0.7s linear infinite;
      }
      @keyframes initialLoaderSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="initialLoader" role="status" aria-live="polite">
      <span class="spinner"></span>
      <span>載入中...</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
